worker_processes auto;

events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Allow large OCR uploads (Up to 100MB)
    client_max_body_size 100m;

    # Gzip compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    upstream api_upstream {
        server api:8000;
    }

    # 1. Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name legalrag.codes www.legalrag.codes;
        return 301 https://$host$request_uri;
    }

    # 2. Secure HTTPS Server
    server {
        listen 443 ssl;
        server_name legalrag.codes www.legalrag.codes;

        # SSL Certificates from Certbot
        ssl_certificate /etc/letsencrypt/live/legalrag.codes/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/legalrag.codes/privkey.pem;

        # Standard SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fallback redirect to Vercel for any non-API traffic hitting this server
        location / {
            return 301 https://legal-ai-copilot-xi.vercel.app$request_uri;
        }

        # API (FastAPI)
        location /api/ {
            rewrite ^/api/?(.*)$ /$1 break;
            proxy_pass http://api_upstream;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
