worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # ── Upload limits ───────────────────────────────────────────────────────────
  # You said: digital PDFs up to 10MB, OCR up to 100MB.
  # Set Nginx to allow 100MB so the OCR queue can accept large scans.
  client_max_body_size 100m;

  upstream api_upstream {
    server api:8000;
  }

  upstream frontend_upstream {
    server frontend:8501;
  }

  server {
    listen 80;
    server_name _;

    # Common proxy headers + timeouts
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ── Frontend (Streamlit) ─────────────────────────────────────────────────
    # Streamlit uses websockets; pass upgrade headers.
    location / {
      proxy_pass http://frontend_upstream;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_cache_bypass $http_upgrade;
    }

    # ── API (FastAPI) ─────────────────────────────────────────────────────────
    location /api/ {
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass http://api_upstream;

      # If you ever stream responses, disabling buffering can help.
      proxy_buffering off;
    }
  }
}
