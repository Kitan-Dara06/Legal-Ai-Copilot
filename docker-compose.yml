version: "3.9"

services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        environment:
            # Use your public URL in production (e.g. https://app.example.com)
            - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost}
        env_file:
            - .env.production
        command: uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*
        restart: always
        networks: [internal]

    frontend:
        build:
            context: .
            dockerfile: Dockerfile.streamlit
        env_file:
            - .env.production
        environment:
            # Streamlit talks to the API via the internal Docker network.
            - API_URL=http://api:8000
            - STREAMLIT_SERVER_ADDRESS=legalrag.codes
            - STREAMLIT_SERVER_PORT=8501
            - STREAMLIT_SERVER_HEADLESS=true
            - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
            # Force Streamlit to trust the secure websocket
            - STREAMLIT_SERVER_ENABLE_CORS=false
            - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=false
        restart: always
        depends_on: [api]
        networks: [internal]

    worker_pdf:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env.production
        command: celery -A app.worker worker -Q default -n pdf_worker@%h -c 2
        restart: always
        networks: [internal]

    worker_ocr:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env.production
        command: celery -A app.worker worker -Q ocr -n ocr_worker@%h -c 1
        restart: always
        networks: [internal]

    celery_beat:
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env.production
        command: celery -A app.worker beat --loglevel=info
        restart: always
        depends_on:
            - api
        networks: [internal]

    nginx:
        image: nginx:alpine
        volumes:
            - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
            - /etc/letsencrypt:/etc/letsencrypt:ro
            - ./certbot_challenge:/var/www/certbot:ro
        ports:
            - "80:80"
            - "443:443"
        # Note: upload size limits are enforced in nginx.conf (client_max_body_size)
        depends_on:
            - api
            - frontend
        restart: always
        networks: [internal]

networks:
    internal:
        driver: bridge
